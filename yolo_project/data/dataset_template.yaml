# YOLOv8 数据集配置文件模板
# 使用说明:
# 1. 复制此文件并重命名为你的数据集名称 (如: mydata.yaml)
# 2. 修改 path 指向你的数据集根目录
# 3. 修改 nc 为类别数量
# 4. 修改 names 为类别名称列表

# 数据集路径 (可以是相对路径或绝对路径)
path: ../datasets/mydata  # 数据集根目录

# 训练/验证/测试图片路径 (相对于 path)
train: images/train      # 训练集
val: images/val          # 验证集 (必须)
test: images/test        # 测试集 (可选,用于最终评估)

# 类别数量
nc: 80

# 类别名称
names:
  0: person
  1: bicycle
  2: car
  3: motorcycle
  4: airplane
  5: bus
  6: train
  7: truck
  8: boat
  9: traffic light
  # ... 添加更多类别

# 可选配置
# download: https://example.com/dataset.zip  # 自动下载链接